name: Copy bhav_options to indexes-live

on:
  workflow_dispatch:

jobs:
  copy-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Dump from old DB and restore to new DB
        run: |
          echo "Dumping from Petocare..."
          PGPASSWORD="${{ secrets.OLD_DB_PASS }}" pg_dump \
            -h aws-0-ap-southeast-1.pooler.supabase.com \
            -U postgres.axobtyzujcbckkbsakpb \
            -d postgres \
            -p 5432 \
            --table=bhav_options \
            --data-only \
            --no-owner \
            --no-privileges \
            -f /tmp/bhav_dump.sql
          echo "Dump complete. File size:"
          ls -lh /tmp/bhav_dump.sql
          echo "Restoring to indexes-live..."
          PGPASSWORD="${{ secrets.NEW_DB_PASS }}" psql \
            -h aws-0-ap-northeast-1.pooler.supabase.com \
            -U postgres.fffgbfvxxixpkxxcfejd \
            -d postgres \
            -p 5432 \
            -f /tmp/bhav_dump.sql
          echo "Restore complete."

      - name: Verify row count
        run: |
          PGPASSWORD="${{ secrets.NEW_DB_PASS }}" psql \
            -h aws-0-ap-northeast-1.pooler.supabase.com \
            -U postgres.fffgbfvxxixpkxxcfejd \
            -d postgres \
            -p 5432 \
            -c "SELECT COUNT(*) as total_rows, MIN(date) as from_date, MAX(date) as to_date FROM bhav_options;"
