<!DOCTYPE html>
<html>
<head>
  <title>FiiDii Backfill Tool</title>
  <style>
    body { background: #111; color: #eee; font-family: monospace; padding: 24px; max-width: 700px; }
    h2 { color: #4A9EFF; }
    button { background: #4A9EFF; color: #000; border: none; padding: 10px 24px; font-size: 14px; font-family: monospace; cursor: pointer; border-radius: 4px; margin-right: 10px; margin-bottom: 10px; }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }
    #log { margin-top: 20px; background: #1a1a1a; border: 1px solid #333; padding: 16px; border-radius: 4px; height: 400px; overflow-y: auto; font-size: 12px; line-height: 1.8; }
    .ok   { color: #00C896; }
    .err  { color: #FF4455; }
    .info { color: #F59E0B; }
    .dim  { color: #666; }
  </style>
</head>
<body>
  <h2>🇮🇳 FiiDii Backfill Tool</h2>
  <p style="color:#9CA3AF;font-size:12px">Fetches last 7 trading days of FII/DII data via your Vercel server and stores in KV. Takes ~30 seconds.</p>

  <button id="btnRun" onclick="runBackfill()">▶ Backfill Last 7 Days</button>
  <button onclick="checkKV()">🔍 Check What's Stored</button>

  <div id="log"><div class="dim">Click the button to start...</div></div>

  <script>
    const BASE = window.location.origin;

    function log(msg, cls='') {
      const el = document.getElementById('log');
      el.innerHTML += `<div class="${cls}">${msg}</div>`;
      el.scrollTop = el.scrollHeight;
    }
    function clearLog() { document.getElementById('log').innerHTML = ''; }

    async function runBackfill() {
      clearLog();
      document.getElementById('btnRun').disabled = true;
      log('🚀 Starting backfill via server...', 'info');
      log(`📡 Calling: ${BASE}/api/fiidii-store?days=7`, 'dim');
      log('⏳ This may take 20–40 seconds (NSE rate limits)...', 'dim');
      log('');

      try {
        const r = await fetch(`${BASE}/api/fiidii-store?days=7`);
        const result = await r.json();

        if (result.stored?.length) {
          log(`✅ Stored: ${result.stored.join(', ')}`, 'ok');
        }
        if (result.skipped?.length) {
          log(`⏭ Already in KV (skipped): ${result.skipped.join(', ')}`, 'dim');
        }
        if (result.failed?.length) {
          result.failed.forEach(f => log(`❌ ${f.date}: ${f.error}`, 'err'));
        }

        log('');
        log(`📊 ${result.message}`, 'info');

        if (result.stored?.length > 0) {
          log('');
          log('🎉 Done! Refresh indexes.live to see the chart with real daily data.', 'ok');
        } else if (result.failed?.length > 0) {
          log('');
          log('⚠ NSE may be blocking. Try again in a few minutes — NSE sometimes blocks multiple rapid requests.', 'err');
        }
      } catch(e) {
        log(`❌ Request failed: ${e.message}`, 'err');
      }

      document.getElementById('btnRun').disabled = false;
    }

    async function checkKV() {
      clearLog();
      log('🔍 Checking KV...', 'info');
      try {
        const r = await fetch(`${BASE}/api/fiidii-backfill`);
        const result = await r.json();
        if (result.stored === 0) {
          log('KV is empty — run the backfill first.', 'err');
        } else {
          log(`✅ ${result.stored} days stored in KV:`, 'ok');
          Object.entries(result.data).sort().forEach(([k, v]) => {
            const date = k.replace('fiidii:', '');
            log(`  ${date}  FII: ${v.fiiNet >= 0 ? '+' : ''}${Math.round(v.fiiNet)} Cr  |  DII: ${v.diiNet >= 0 ? '+' : ''}${Math.round(v.diiNet)} Cr`, 'dim');
          });
        }
      } catch(e) {
        log(`❌ ${e.message}`, 'err');
      }
    }
  </script>
</body>
</html>
